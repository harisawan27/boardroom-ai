<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#06080f" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- SEO Meta Tags -->
    <title>Boardroom AI — The AI Executive Team Every Founder Deserves</title>
    <meta name="description" content="Boardroom AI simulates a virtual board meeting where 6 specialized AI agents analyze your business or life decision from different expert perspectives, debate it, vote on it, and produce a structured executive decision report." />
    <meta name="keywords" content="AI board meeting, executive decision engine, multi-agent AI, Google ADK, Gemini, business decisions" />

    <!-- Open Graph -->
    <meta property="og:title" content="Boardroom AI — AI Executive Decision Engine" />
    <meta property="og:description" content="6 AI board members analyze your decision from every angle — strategy, finance, tech, marketing, risk, and devil's advocacy." />
    <meta property="og:type" content="website" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Premium Loading Splash Screen (replaced when React mounts) -->
      <style>
        .initial-splash {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #06080f;
          z-index: 9999;
          font-family: 'Inter', sans-serif;
        }
        .initial-splash-logo {
          width: 64px;
          height: 64px;
          border-radius: 16px;
          background-color: #ffffff;
          box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 12px;
          animation: pulse-logo 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .initial-splash-logo img {
          width: 100%;
          height: 100%;
          object-fit: contain;
        }
        .initial-splash-text {
          margin-top: 24px;
          font-size: 18px;
          font-weight: 800;
          letter-spacing: -0.025em;
          color: #ffffff;
        }
        .initial-splash-text span {
          color: #2563EB;
        }
        .initial-splash-spinner {
          margin-top: 16px;
          width: 24px;
          height: 24px;
          border: 2px solid rgba(255,255,255,0.1);
          border-top-color: #2563EB;
          border-radius: 50%;
          animation: spin-loader 0.8s linear infinite;
        }
        @keyframes pulse-logo {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: .85; transform: scale(0.95); }
        }
        @keyframes spin-loader {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-splash">
        <div class="initial-splash-logo">
          <img src="/boardroom-ai.svg" alt="Boardroom AI Logo" />
        </div>
        <div class="initial-splash-text">
          Boardroom<span>AI</span>
        </div>
        <div class="initial-splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
